<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>galanthus - OAuth callback</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    max-width: 40rem;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { margin-top: 0; font-size: 1.4rem; }
  #action { font-size: 1.05rem; margin-top: 0; }
  #details small { opacity: 0.7; }
  .panel {
    border: 1px solid rgba(127,127,127,0.3);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    margin: 1rem 0;
  }
  .code {
    font-family: ui-monospace, Consolas, Menlo, monospace;
    background: rgba(127,127,127,0.1);
    padding: 0.8rem;
    border-radius: 4px;
    word-break: break-all;
    font-size: 0.95rem;
    user-select: all;
  }
  button {
    padding: 0.55rem 1.1rem;
    margin-right: 0.4rem;
    font-size: 0.95rem;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid rgba(127,127,127,0.5);
    background: rgba(127,127,127,0.1);
    color: inherit;
  }
  button:hover { background: rgba(127,127,127,0.2); }
  .ok { color: #2e7d32; }
  .err { color: #c62828; }
  .warn { color: #ef6c00; }
  small { opacity: 0.75; }
</style>
</head>
<body>
<h1 id="title">galanthus</h1>
<div id="panel" class="panel">
  <p id="action">Reading authorization code...</p>
  <div id="code-box" class="code" hidden></div>
  <div id="actions" hidden>
    <button id="copy-btn" type="button">Copy</button>
    <span id="copy-status" style="margin-left:0.5rem"></span>
  </div>
  <p id="details" hidden><small></small></p>
</div>
<p id="footer" hidden><small>No data is sent anywhere. Runs entirely in your browser.</small></p>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  var err = params.get('error');
  var errDesc = params.get('error_description');
  var title = document.getElementById('title');
  var action = document.getElementById('action');
  var box = document.getElementById('code-box');
  var actions = document.getElementById('actions');
  var details = document.getElementById('details');
  var copyBtn = document.getElementById('copy-btn');
  var copyStatus = document.getElementById('copy-status');
  var footer = document.getElementById('footer');

  function setDetails(text) {
    details.querySelector('small').textContent = text;
    details.hidden = false;
  }

  if (err) {
    title.textContent = 'Authorization failed';
    action.textContent = err + (errDesc ? ' - ' + errDesc : '');
    action.className = 'err';
    setDetails('Close this tab and re-run the galanthus auth command.');
    return;
  }
  if (!code) {
    title.textContent = 'Nothing to do';
    action.textContent = 'You can close this tab.';
    setDetails('No authorization code in the URL - this page was opened by mistake.');
    return;
  }

  // galanthus mints a 32-hex state on every login attempt. A redirect
  // without that state is typically Revolut's "Enable access" activation
  // hop, which produces a code that will not work at /auth/token.
  var stateLooksRight = state && /^[a-f0-9]{32}$/.test(state);
  if (!stateLooksRight) {
    title.textContent = 'Access enabled';
    action.textContent = 'You can close this tab.';
    setDetails('This redirect was the Revolut cert activation, not a galanthus login. Galanthus will open a new tab when it needs you to authorise.');
    return;
  }

  title.textContent = 'Copy the code';
  action.textContent = 'Paste into the galanthus terminal prompt.';
  footer.hidden = false;
  var payload = code + '&state=' + state;
  box.textContent = payload;
  box.hidden = false;
  actions.hidden = false;
  next.hidden = false;

  function flash(text) {
    copyStatus.textContent = text;
    setTimeout(function () { copyStatus.textContent = ''; }, 1800);
  }

  copyBtn.addEventListener('click', function () {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(payload).then(function () {
        flash('Copied.');
      }).catch(function () {
        flash('Copy failed - select the text above and copy manually.');
      });
    } else {
      flash('Clipboard API unavailable - select the text above and copy manually.');
    }
  });
})();
</script>
</body>
</html>
